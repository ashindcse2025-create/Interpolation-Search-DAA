<!DOCTYPE html>
<html>

<head>

<title>
Interpolation Search
</title>

<style>

body{
    font-family: Arial;
    background:#e8f4ff;
    text-align:center;
}

.container{

    width:500px;
    margin:auto;
    margin-top:50px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;

}

input{

    width:90%;
    padding:10px;
    margin:10px;

}

button{

    background:#007bff;
    color:white;
    padding:12px 25px;
    border:none;
    border-radius:5px;

}

button:hover{

    background:#0056b3;

}

.result{

    margin-top:20px;
    color:green;
    font-size:20px;

}


</style>

</head>


<body>


<div class="container">

<h1>
Interpolation Search
</h1>


<form method="POST">


<input 
type="text"
name="array"
placeholder="Enter sorted numbers (10,20,30,40)"
required>


<input 
type="number"
name="target"
placeholder="Enter search element"
required>


<button type="submit">
Search
</button>


</form>


<div class="result">

<h3>{{result}}</h3>


<h4>Steps:</h4>

{% for step in steps %}

<p>{{step}}</p>

{% endfor %}


</div>


</div>


</body>

</html>
